# 默认 profile：postgres + backend（STORAGE_BACKEND=local，文件存在挂载卷里）
# 想用 MinIO：`docker compose --profile minio up -d`
# 想用 OSS：  `STORAGE_BACKEND=oss docker compose up -d`，无需 MinIO 容器
services:
  postgres:
    image: postgres:16-alpine
    container_name: autoluyin-pg
    environment:
      POSTGRES_USER: autoluyin
      POSTGRES_PASSWORD: autoluyin_dev
      POSTGRES_DB: autoluyin
    ports:
      - "${POSTGRES_HOST_PORT:-25432}:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoluyin -d autoluyin"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: autoluyin-minio
    profiles: ["minio"]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin_dev
    ports:
      - "${MINIO_HOST_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-19001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: autoluyin-minio-init
    profiles: ["minio"]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin_dev;
      mc mb -p local/recordings || true;
      mc anonymous set download local/recordings || true;
      echo 'MinIO bucket ready';
      "

  redis:
    image: redis:7-alpine
    container_name: autoluyin-redis
    ports:
      - "${REDIS_HOST_PORT:-16379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autoluyin-backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://autoluyin:autoluyin_dev@postgres:5432/autoluyin
      REDIS_URL: redis://redis:6379/0
    ports:
      - "${BACKEND_HOST_PORT:-18000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - recordings_data:/data/recordings   # local 模式下录音落在这里
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autoluyin-celery
    command: celery -A app.worker.celery_app worker --loglevel=info -Q default
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://autoluyin:autoluyin_dev@postgres:5432/autoluyin
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - recordings_data:/data/recordings

volumes:
  pg_data:
  minio_data:
  recordings_data:
